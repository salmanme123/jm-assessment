<div class="min-h-screen bg-slate-50 text-slate-950">
  <AppHeader />

  <main class="mx-auto flex max-w-7xl flex-col gap-6 px-4 py-6 sm:px-6 lg:px-8">
    <SearchForm />

    <section class="grid gap-6 lg:grid-cols-[280px_minmax(0,1fr)]">
      <aside class="rounded-lg border border-slate-200 bg-white p-4 shadow-sm sm:p-5">
        <div class="flex items-center justify-between gap-3">
          <h2 class="text-base font-semibold text-slate-950">Filters</h2>
          <button class="text-sm font-medium text-sky-700" type="button">
            Reset
          </button>
        </div>

        <div class="mt-5 space-y-6">
          <div>
            <p class="text-sm font-medium text-slate-700">Stops</p>
            <div class="mt-3 space-y-2 text-sm text-slate-600">
              <label class="flex items-center gap-2">
                <input class="size-4 rounded border-slate-300" type="checkbox" checked />
                Nonstop
              </label>
              <label class="flex items-center gap-2">
                <input class="size-4 rounded border-slate-300" type="checkbox" />
                1 stop
              </label>
              <label class="flex items-center gap-2">
                <input class="size-4 rounded border-slate-300" type="checkbox" />
                2+ stops
              </label>
            </div>
          </div>

        </div>
      </aside>

      <section class="flex min-w-0 flex-col gap-4">

        <div class="grid gap-4">
          <article
            v-for="offer in placeholderOffers"
            :key="offer.id"
            class="rounded-lg border border-slate-200 bg-white p-4 shadow-sm transition hover:border-sky-200 hover:shadow-md sm:p-5"
          >
            <div class="flex flex-col gap-4 sm:flex-row sm:items-start sm:justify-between">
              <div>
                <p class="text-sm font-semibold text-sky-700">{{ offer.airline }}</p>
                <h3 class="mt-1 text-xl font-semibold text-slate-950">{{ offer.route }}</h3>
                <p class="mt-2 text-sm text-slate-600">{{ offer.time }}</p>
              </div>

              <div class="sm:text-right">
                <p class="text-2xl font-bold text-slate-950">{{ offer.price }}</p>
                <p class="mt-1 text-sm text-slate-500">total price</p>
              </div>
            </div>

            <div class="mt-5 grid gap-3 border-t border-slate-100 pt-4 text-sm text-slate-600 sm:grid-cols-3">
              <div>
                <span class="block font-medium text-slate-900">Duration</span>
                {{ offer.duration }}
              </div>
              <div>
                <span class="block font-medium text-slate-900">Stops</span>
                {{ offer.stops }}
              </div>
              <div>
                <span class="block font-medium text-slate-900">Details</span>
                Segments and baggage coming next
              </div>
            </div>
          </article>
        </div>
      </section>
    </section>
  </main>
</div>
