<form class="rounded-lg border border-slate-200 bg-white p-4 shadow-sm sm:p-6" @submit.prevent="handleSubmit">
  <div class="flex flex-col gap-1">
    <p class="text-sm font-semibold uppercase tracking-wide text-sky-700">
      Search criteria
    </p>
    <h2 class="text-xl font-semibold tracking-tight text-slate-950">
      Find available flights
    </h2>
  </div>

  <div class="mt-5 grid gap-4 md:grid-cols-2 lg:grid-cols-6">
    <label class="flex flex-col gap-2 lg:col-span-1">
      <span class="text-sm font-medium text-slate-700">Origin</span>
      <input
        v-model="form.origin"
        class="rounded-md border border-slate-300 bg-white px-3 py-2 text-slate-900 outline-none transition placeholder:text-slate-400 focus:border-sky-600 focus:ring-2 focus:ring-sky-100"
        name="origin"
        placeholder="LHR"
        type="text"
      />
      <span v-if="errors.origin" class="text-sm text-red-600">{{ errors.origin }}</span>
    </label>

    <label class="flex flex-col gap-2 lg:col-span-1">
      <span class="text-sm font-medium text-slate-700">Destination</span>
      <input
        v-model="form.destination"
        class="rounded-md border border-slate-300 bg-white px-3 py-2 text-slate-900 outline-none transition placeholder:text-slate-400 focus:border-sky-600 focus:ring-2 focus:ring-sky-100"
        name="destination"
        placeholder="JFK"
        type="text"
      />
      <span v-if="errors.destination" class="text-sm text-red-600">{{ errors.destination }}</span>
    </label>

    <label class="flex flex-col gap-2 lg:col-span-1">
      <span class="text-sm font-medium text-slate-700">Depart</span>
      <input
        v-model="form.departureDate"
        class="rounded-md border border-slate-300 bg-white px-3 py-2 text-slate-900 outline-none transition focus:border-sky-600 focus:ring-2 focus:ring-sky-100"
        name="departureDate"
        :min="today"
        type="date"
      />
      <span v-if="errors.departureDate" class="text-sm text-red-600">{{ errors.departureDate }}</span>
    </label>

    <label class="flex flex-col gap-2 lg:col-span-1">
      <span class="text-sm font-medium text-slate-700">Return</span>
      <input
        v-model="form.returnDate"
        class="rounded-md border border-slate-300 bg-white px-3 py-2 text-slate-900 outline-none transition focus:border-sky-600 focus:ring-2 focus:ring-sky-100"
        name="returnDate"
        :min="form.departureDate || today"
        type="date"
      />
      <span v-if="errors.returnDate" class="text-sm text-red-600">{{ errors.returnDate }}</span>
    </label>

    <label class="flex flex-col gap-2 lg:col-span-1">
      <span class="text-sm font-medium text-slate-700">Passengers</span>
      <input
        v-model.number="form.passengerCount"
        class="rounded-md border border-slate-300 bg-white px-3 py-2 text-slate-900 outline-none transition focus:border-sky-600 focus:ring-2 focus:ring-sky-100"
        min="1"
        name="passengerCount"
        type="number"
      />
      <span v-if="errors.passengerCount" class="text-sm text-red-600">{{ errors.passengerCount }}</span>
    </label>

    <div class="flex items-end lg:col-span-1">
      <button
        class="w-full rounded-md bg-sky-700 px-5 py-2.5 text-sm font-semibold text-white shadow-sm transition hover:bg-sky-800 focus:outline-none focus:ring-2 focus:ring-sky-600 focus:ring-offset-2"
        type="submit"
      >
        Search flights
      </button>
    </div>
  </div>

</form>
