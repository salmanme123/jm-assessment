<form class="rounded-lg border border-slate-200 bg-white p-4 shadow-sm sm:p-6" @submit.prevent="handleSubmit">
  <div class="flex flex-col gap-4 lg:flex-row lg:items-end lg:justify-between">
    <div class="flex flex-col gap-1">
      <p class="text-sm font-semibold uppercase tracking-wide text-sky-700">
        Search criteria
      </p>
      <h2 class="text-xl font-semibold tracking-tight text-slate-950">
        Find available flights
      </h2>
    </div>

    <div class="grid grid-cols-2 rounded-lg bg-slate-100 p-1 text-sm font-semibold text-slate-600">
      <button
        class="rounded-md px-4 py-2 transition"
        :class="tripType === 'round_trip' ? 'bg-white text-sky-700 shadow-sm' : 'hover:text-slate-950'"
        type="button"
        @click="tripType = 'round_trip'"
      >
        Round trip
      </button>
      <button
        class="rounded-md px-4 py-2 transition"
        :class="tripType === 'one_way' ? 'bg-white text-sky-700 shadow-sm' : 'hover:text-slate-950'"
        type="button"
        @click="tripType = 'one_way'"
      >
        One-way
      </button>
    </div>
  </div>

  <div class="mt-5 grid gap-3 md:grid-cols-2 xl:grid-cols-[1.1fr_1.1fr_1fr_1fr_.8fr_.9fr_auto]">
    <label class="flex min-h-24 flex-col justify-between rounded-lg border border-slate-200 bg-slate-50 px-4 py-3 transition focus-within:border-sky-500 focus-within:bg-white focus-within:ring-2 focus-within:ring-sky-100">
      <span class="text-xs font-semibold uppercase tracking-wide text-slate-500">From</span>
      <select
        v-model="form.origin"
        class="mt-2 w-full bg-transparent text-base font-semibold text-slate-950 outline-none"
        name="origin"
      >
        <option v-for="option in airportOptions" :key="option.value" :value="option.value">{{ option.label }}</option>
      </select>
      <span v-if="errors.origin" class="mt-1 text-sm text-red-600">{{ errors.origin }}</span>
    </label>

    <label class="flex min-h-24 flex-col justify-between rounded-lg border border-slate-200 bg-slate-50 px-4 py-3 transition focus-within:border-sky-500 focus-within:bg-white focus-within:ring-2 focus-within:ring-sky-100">
      <span class="text-xs font-semibold uppercase tracking-wide text-slate-500">To</span>
      <select
        v-model="form.destination"
        class="mt-2 w-full bg-transparent text-base font-semibold text-slate-950 outline-none"
        name="destination"
      >
        <option v-for="option in airportOptions" :key="option.value" :value="option.value">{{ option.label }}</option>
      </select>
      <span v-if="errors.destination" class="mt-1 text-sm text-red-600">{{ errors.destination }}</span>
    </label>

    <label class="flex min-h-24 flex-col justify-between rounded-lg border border-slate-200 bg-slate-50 px-4 py-3 transition focus-within:border-sky-500 focus-within:bg-white focus-within:ring-2 focus-within:ring-sky-100">
      <span class="text-xs font-semibold uppercase tracking-wide text-slate-500">Depart</span>
      <input
        v-model="form.departureDate"
        class="mt-2 w-full bg-transparent text-base font-semibold text-slate-950 outline-none"
        name="departureDate"
        :min="today"
        type="date"
      />
      <span v-if="errors.departureDate" class="mt-1 text-sm text-red-600">{{ errors.departureDate }}</span>
    </label>

    <label
      class="flex min-h-24 flex-col justify-between rounded-lg border border-slate-200 bg-slate-50 px-4 py-3 transition focus-within:border-sky-500 focus-within:bg-white focus-within:ring-2 focus-within:ring-sky-100"
      :class="tripType === 'one_way' ? 'opacity-60' : ''"
    >
      <span class="text-xs font-semibold uppercase tracking-wide text-slate-500">Return</span>
      <input
        v-model="form.returnDate"
        class="mt-2 w-full bg-transparent text-base font-semibold text-slate-950 outline-none disabled:cursor-not-allowed disabled:text-slate-400"
        name="returnDate"
        :disabled="tripType === 'one_way'"
        :min="form.departureDate || today"
        type="date"
      />
      <span v-if="errors.returnDate" class="mt-1 text-sm text-red-600">{{ errors.returnDate }}</span>
    </label>

    <label class="flex min-h-24 flex-col justify-between rounded-lg border border-slate-200 bg-slate-50 px-4 py-3 transition focus-within:border-sky-500 focus-within:bg-white focus-within:ring-2 focus-within:ring-sky-100">
      <span class="text-xs font-semibold uppercase tracking-wide text-slate-500">Travelers</span>
      <input
        v-model.number="form.passengerCount"
        class="mt-2 w-full bg-transparent text-base font-semibold text-slate-950 outline-none"
        min="1"
        name="passengerCount"
        type="number"
      />
      <span v-if="errors.passengerCount" class="mt-1 text-sm text-red-600">{{ errors.passengerCount }}</span>
    </label>

    <label class="flex min-h-24 flex-col justify-between rounded-lg border border-slate-200 bg-slate-50 px-4 py-3 transition focus-within:border-sky-500 focus-within:bg-white focus-within:ring-2 focus-within:ring-sky-100">
      <span class="text-xs font-semibold uppercase tracking-wide text-slate-500">Cabin</span>
      <select
        v-model="form.cabinClass"
        class="mt-2 w-full bg-transparent text-base font-semibold text-slate-950 outline-none"
        name="cabinClass"
      >
        <option v-for="option in cabinClassOptions" :key="option.value" :value="option.value">{{ option.label }}</option>
      </select>
    </label>

    <div class="flex min-h-24 items-stretch md:col-span-2 xl:col-span-1">
      <button
        class="w-full rounded-lg bg-sky-700 px-6 py-4 text-sm font-semibold text-white shadow-sm transition hover:bg-sky-800 focus:outline-none focus:ring-2 focus:ring-sky-600 focus:ring-offset-2 disabled:cursor-not-allowed disabled:bg-slate-400 xl:min-w-36"
        type="submit"
        :disabled="flightSearchStore.isLoading"
      >
        {{ flightSearchStore.isLoading ? 'Searching...' : 'Search flights' }}
      </button>
    </div>
  </div>
</form>
