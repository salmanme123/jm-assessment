<div class="relative flex min-h-24 flex-col justify-between rounded-lg border border-slate-200 bg-slate-50 px-4 py-3 transition focus-within:border-sky-500 focus-within:bg-white focus-within:ring-2 focus-within:ring-sky-100">
  <span class="text-xs font-semibold uppercase tracking-wide text-slate-500">{{ label }}</span>
  <input
    v-model="query"
    class="mt-2 w-full bg-transparent text-2xl font-semibold uppercase tracking-wide text-slate-950 outline-none placeholder:text-slate-300"
    autocomplete="off"
    :name="name"
    :placeholder="placeholder"
    type="text"
    @input="handleInput"
    @focus="handleFocus"
    @blur="handleBlur"
  />
  <span v-if="error" class="mt-1 text-sm text-red-600">{{ error }}</span>

  <ul
    v-if="isOpen && (suggestions.length > 0 || isLoading)"
    class="absolute left-0 right-0 top-full z-10 mt-1 max-h-56 overflow-y-auto rounded-lg border border-slate-200 bg-white py-1 text-sm shadow-lg"
  >
    <li v-if="isLoading" class="px-3 py-2 text-slate-400">Searching...</li>
    <li v-for="suggestion in suggestions" :key="suggestion.value">
      <button
        class="block w-full px-3 py-2 text-left text-slate-700 hover:bg-sky-50 hover:text-sky-700"
        type="button"
        @mousedown.prevent="selectSuggestion(suggestion)"
      >
        {{ suggestion.label }}
      </button>
    </li>
  </ul>
</div>
